  </g>
  <!-- tiny printed house numbers, like the real plan -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="5" fill="#5a5346" text-anchor="middle">
    <text x="204" y="2698">1</text>
    <text x="254" y="2732">12</text>
    <text x="307" y="2766">14</text>
    <text x="226" y="2838">101</text>
    <text x="283" y="2878">102</text>
    <text x="355" y="2918">142</text>
    <text x="408" y="2958">143</text>
    <text x="452" y="2996">376</text>
  </g>
  <!-- landmark dots -->
  <g fill="#b0562c">
    <circle cx="330" cy="2800" r="3"/>
    <circle cx="260" cy="2950" r="3"/>
  </g>
  <text x="1207" y="1500" font-family="Helvetica" font-size="60" fill="#ddd6c8" text-anchor="middle">TEST SHEET — mostly empty like the real plan</text>
