<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2415 3146">
  <!-- TEST FIXTURE — fake street plan. Community clustered lower-left like the real map. -->
  <rect x="0" y="0" width="2415" height="3146" fill="#f4f1ea"/>
  <!-- streets -->
  <g stroke="#c9c2b4" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M 160 2650 L 500 2900 L 520 3060"/>
    <path d="M 180 2900 L 470 2980"/>
    <path d="M 300 2700 L 250 3050"/>
  </g>
  <g stroke="#ffffff" stroke-width="2.5" fill="none" stroke-dasharray="10 8" stroke-linecap="round">
    <path d="M 160 2650 L 500 2900 L 520 3060"/>
  </g>
  <!-- river -->
  <path d="M 80 2600 C 60 2800 100 3000 60 3140" stroke="#a9c8de" stroke-width="24" fill="none" stroke-linecap="round"/>
  <!-- buildings (match data.js polygons) -->
  <g fill="#d8d2c4" stroke="#8f887a" stroke-width="0.7">
    <rect x="200" y="2700" width="8"  height="8"/>
    <rect x="250" y="2734" width="8"  height="10"/>
    <rect x="300" y="2768" width="14" height="8"/>
    <rect x="220" y="2840" width="12" height="12"/>
    <rect x="276" y="2880" width="14" height="8"/>
    <rect x="345" y="2920" width="20" height="10"/>
    <rect x="405" y="2960" width="6"  height="6"/>
