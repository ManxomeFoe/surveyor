<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Surveyor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ======= Top app bar ======= -->
<header id="topbar">
  <select id="communitySelect" aria-label="Community"></select>
  <div id="searchWrap">
    <svg id="searchIcon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
      <circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="currentColor" stroke-width="2"/>
      <line x1="15.5" y1="15.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <input id="searchInput" type="search" inputmode="search" autocomplete="off"
           placeholder="House # or landmark…" aria-label="Search">
    <button id="searchClear" aria-label="Clear search" hidden>&#10005;</button>
    <div id="searchResults" hidden></div>
  </div>
  <button id="menuBtn" aria-label="Menu">&#8942;</button>
  <div id="menuDropdown" hidden>
    <button id="addMapBtn">Add map&#8230;</button>
    <button id="renameMapBtn" hidden>Rename map&#8230;</button>
    <button id="deleteMapBtn" class="danger-item" hidden>Delete map&#8230;</button>
    <button id="resetDataBtn" class="danger-item">Reset community data&#8230;</button>
  </div>
</header>

<input type="file" id="filePicker" accept="image/*,.svg,.json" hidden>

<!-- ======= Map stage ======= -->
<main id="stage">
  <div id="mapLayer">
    <img id="baseImg" alt="" draggable="false">
    <svg id="overlay" xmlns="http://www.w3.org/2000/svg">
      <g id="gFills"></g>
      <g id="gLabels"></g>
      <g id="gHits"></g>
      <g id="gFx"></g>
      <g id="gDetect"></g>
      <g id="gPins"></g>
    </svg>
  </div>

  <div id="emptyState" hidden>
    <div class="empty-card">
      <div class="empty-icon">&#128506;</div>
      <h2>Map data not found</h2>
      <p id="emptyMsg">The map for this community hasn&rsquo;t been installed yet.</p>
    </div>
  </div>
</main>

<!-- ======= Floating map controls ======= -->
<div id="mapControls">
  <button id="zoomInBtn"  class="ctl" aria-label="Zoom in">+</button>
  <button id="zoomOutBtn" class="ctl" aria-label="Zoom out">&#8722;</button>
  <button id="fitBtn"     class="ctl" aria-label="Fit map to screen">&#8982;</button>
  <button id="markerBtn"  class="ctl" aria-label="Add marker">
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path d="M12 2a7 7 0 0 0-7 7c0 4.6 5.3 10.4 6.6 11.8a.55.55 0 0 0 .8 0C13.7 19.4 19 13.6 19 9a7 7 0 0 0-7-7Z"
            fill="currentColor"/>
      <circle cx="12" cy="9" r="2.6" fill="#fff"/>
    </svg>
  </button>
  <button id="editBtn" class="ctl" aria-label="Edit buildings" hidden>
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path d="M3 17.2V21h3.8L17.9 9.9l-3.8-3.8L3 17.2Zm17.7-10.4a1 1 0 0 0 0-1.4l-2.1-2.1a1 1 0 0 0-1.4 0l-1.8 1.8 3.8 3.8 1.5-1.5Z"
            fill="currentColor"/>
    </svg>
  </button>
  <button id="detectBtn" class="ctl" aria-label="Detect buildings automatically" hidden>
    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
      <path d="M12 4.5l1.7 4.6 4.6 1.7-4.6 1.7L12 17.1l-1.7-4.6-4.6-1.7 4.6-1.7L12 4.5Z" fill="currentColor"/>
      <path d="M19 3l.8 2.2L22 6l-2.2.8L19 9l-.8-2.2L16 6l2.2-.8L19 3ZM5 15l.7 1.8 1.8.7-1.8.7L5 20l-.7-1.8-1.8-.7 1.8-.7L5 15Z" fill="currentColor"/>
    </svg>
  </button>
</div>
<div id="markerHint" hidden>Tap the map to drop a marker</div>
<div id="editHint" hidden>Tap to add a building &#183; drag to draw one</div>

<div id="busy" hidden>
  <div class="busy-card">
    <div class="busy-spinner"></div>
    <span id="busyText">Working&#8230;</span>
  </div>
</div>

<!-- ======= Legend (bottom-left) ======= -->
<section id="legend" hidden>
  <button id="legendHeader" aria-expanded="true">
    <span id="legendSwatches"></span>
    <span id="legendTitle">Legend</span>
    <span id="legendChevron">&#9662;</span>
  </button>
  <div id="legendBody"></div>
</section>

<!-- ======= Color bottom sheet ======= -->
<div id="sheetScrim" hidden></div>
<section id="colorSheet" hidden>
  <div class="sheet-grab"></div>
  <div class="sheet-head">
    <h3 id="sheetTitle">Building</h3>
    <button id="sheetClose" aria-label="Close">&#10005;</button>
  </div>
  <div id="palette"></div>
  <div class="sheet-row">
    <label id="customColorLbl" for="customColor">
      <span id="customSwatch"></span> Custom color
      <input type="color" id="customColor" value="#0ea5e9">
    </label>
    <button id="clearColorBtn">Clear</button>
  </div>
</section>

<!-- ======= Modal dialog ======= -->
<div id="modalScrim" hidden>
  <div id="modal" role="dialog">
    <h3 id="modalTitle"></h3>
    <p id="modalMsg" hidden></p>
    <input id="modalInput" type="text" autocomplete="off" hidden>
    <div id="modalBtns"></div>
  </div>
</div>

<div id="toast" hidden></div>

<script src="maps/index.js"></script>
<script src="app.js"></script>
</body>
</html>
